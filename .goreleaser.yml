version: 2

builds:
  - main: ./cmd/devrecap
    binary: devrecap
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - repository:
      owner: cloudprobe
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/cloudprobe/devrecap
    description: Know what you actually did today, including your AI sessions
    license: MIT
    install: |
      bin.install "devrecap"
    test: |
      assert_match "devrecap", shell_output("#{bin}/devrecap --version")
